<uiView 
  onFlickUp="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
  onFlickDown="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
  onLoad="
    var g = typeof globalThis !== 'undefined' ? globalThis : (typeof window !== 'undefined' ? window : Function('return this')());
    g.g = g;
    
    /* ¡LA CLAVE DE LA VELOCIDAD! Heredamos los targets de t.html sin borrarlos */
    g.targetLow = g.targetLow || 0;
    g.targetHigh = g.targetHigh || 0;

    /* Función que devuelve el texto de alerta instantáneamente */
    g.getAlertText = function(x) {
        var hr = Math.round(x * 60) || 0;
        var low = g.targetLow || 0;
        var high = g.targetHigh || 0;
        
        if (low === 0 || hr === 0) return '';
        if (hr < low) return 'TOO LOW!';
        if (hr > high) return 'TOO HIGH!';
        
        return '';
    };

    /* Canvas ultra ligero: Franja Amarilla fija y fondo Negro puro */
    g.drawAlertBackground = function(ctx) {
      var cx = ctx.width / 2;
      var cy = ctx.width / 2;

      // 1. Draw top curved warning banner
      var rHeader = ctx.width / 2 - 14;
      var dyHeader = 0.15 * ctx.width - cy;
      if (rHeader > Math.abs(dyHeader)) {
        var endH = Math.asin(dyHeader / rHeader);
        var startH = -Math.PI - endH;
        ctx.beginPath();
        ctx.arc(cx, cy, rHeader, startH, endH, false);
        ctx.closePath();
        ctx.fillStyle = '#FFE322';
        ctx.fill();
      }

      // 2. Draw bottom bubble (Fondo negro modo oscuro)
      var rBubble = ctx.width / 2 - 4;
      var yBubble = 0.38 * ctx.width;
      var dyBubble = yBubble - cy;
      if (rBubble > Math.abs(dyBubble)) {
        var startB = Math.asin(dyBubble / rBubble);
        var endB = Math.PI - startB;
        ctx.beginPath();
        var xLeft = cx + rBubble * Math.cos(endB);
        var yLeft = cy + rBubble * Math.sin(endB);
        ctx.moveTo(xLeft, yLeft);
        ctx.lineTo(cx + rBubble * Math.cos(startB), cy + rBubble * Math.sin(startB));
        ctx.arc(cx, cy, rBubble, startB, endB, false);
        ctx.closePath();
        
        ctx.fillStyle = '#000000'; 
        ctx.fill();
      }
    };
  "
>
    <div style="background-color:#111111; width:100%; height:100%; position:absolute; top:0; left:0;">
        <object type="canvas" id="alertBgCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%;" build="ctx => g.drawAlertBackground(ctx);" />

        <div style="top:4%; left:12%; width:76%; height:11%; position:absolute;">
            <div class="sp-t-m p-hc" style="top:calc(58% - 50%e); color:#000000; font-weight:bold; position:absolute;">
                WARNING
            </div>
        </div>

        <div style="top:24%; left:10%; width:80%; height:10%; position:absolute;">
            <div class="p-hc" style="top:calc(50% - 50%e); color:#FFE322; font-weight:bold; font-size:22px; position:absolute;">
                <eval input="/Activity/Move/-1/HeartRate/Current" outputFormat="script x => g.getAlertText(x)" default="" />
            </div>
        </div>

        <div class="sp-vertical-center" style="top:calc(46% - 50%e); left:14%; position:absolute;">
            <span class="f-ico" style="color:#FF2A55;">&#xF101;</span>
            <span class="f-s" style="color:#AAAAAA; margin-left:4px;">HR</span>
        </div>
        <div class="sp-vertical-center" style="top:calc(46% - 50%e); left:46%; position:absolute;">
            <span class="f-num" style="color:#FFFFFF; font-size:24px; font-weight:bold;">
                <eval input="/Activity/Move/-1/HeartRate/Current" outputFormat="HeartRate_Fourdigits" default="--" />
            </span>
        </div>
        <div class="sp-vertical-center" style="top:calc(46% - 50%e); left:76%; position:absolute;">
            <span class="f-s" style="color:#AAAAAA; font-weight:bold; font-size:12px;">bpm</span>
        </div>

        <div class="sp-vertical-center" style="top:calc(62% - 50%e); left:14%; position:absolute;">
            <span class="f-s" style="color:#AAAAAA; font-weight:bold; font-size:11px;">TARGET</span>
        </div>
        <div class="sp-vertical-center" style="top:calc(62% - 50%e); left:37%; position:absolute;">
            <span class="f-num" style="color:#FFFFFF; font-size:24px; font-weight:bold;">
                <eval input="/Zapp/{zapp_index}/Output/hrTargetNum" outputFormat="script x => Math.floor(x/1000) + '-' + (x%1000)" default="---" onValueChanged="var parts = targetData.split('-'); if (parts.length === 2) { g.targetLow = Number(parts[0]) || 0; g.targetHigh = Number(parts[1]) || 0; } else { g.targetLow = 0; g.targetHigh = 0; }" />
            </span>
        </div>
        <div class="sp-vertical-center" style="top:calc(62% - 50%e); left:76%; position:absolute;">
            <span class="f-s" style="color:#AAAAAA; font-weight:bold; font-size:12px;">bpm</span>
        </div>

        <div class="sp-vertical-center" style="top:calc(78% - 50%e); left:14%; position:absolute;">
            <span class="f-ico" style="color:#00FF78;">&#xF103;</span>
            <span class="f-s" style="color:#AAAAAA; margin-left:4px;">PACE</span>
        </div>
        <div class="sp-vertical-center" style="top:calc(78% - 50%e); left:42%; position:absolute;">
            <span class="f-num" style="color:#FFFFFF; font-size:24px; font-weight:bold;">
                <eval input="/Activity/Move/-1/Speed/Current" outputFormat="Pace_Fourdigits" default="--:--" />
            </span>
        </div>
        <div class="sp-vertical-center" style="top:calc(78% - 50%e); left:70%; position:absolute;">
            <span class="f-s" style="color:#AAAAAA; font-weight:bold; font-size:12px;">min/km</span>
        </div>

    </div>
</uiView>
