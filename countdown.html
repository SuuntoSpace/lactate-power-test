<uiView onLoad="
    var g = typeof globalThis !== 'undefined' ? globalThis : (typeof window !== 'undefined' ? window : Function('return this')());
    g.g = g;
    g.countVal = 5;
    g.animTick = 0;

    g.getEcgY = function(x, w) {
      var x_orig = x * (576 / w);
      if (160 > x_orig || x_orig > 380) {
        return 0;
      }
      var val = 0;
      if (245 > x_orig) {
        val = 61 * Math.sin((x_orig - 160) / 85 * Math.PI);
      } else if (286 > x_orig) {
        val = -80 * Math.sin((x_orig - 245) / 41 * Math.PI);
      } else if (328 > x_orig) {
        if (312 > x_orig) {
          var t = (x_orig - 286) / 26;
          val = 139 * t * t;
        } else {
          val = 139 * (328 - x_orig) / 16;
        }
      } else if (345 > x_orig) {
        val = -13 * Math.sin((x_orig - 328) / 17 * Math.PI);
      } else {
        val = 52 * Math.sin((x_orig - 345) / 35 * Math.PI);
      }
      var scale = w / 576;
      return 0 - val * scale;
    };

    g.drawEcgPath = function(ctx, x1, x2, w, yPulse) {
      var xStart = Math.floor(160 * w / 576);
      var xEnd = Math.floor(380 * w / 576);

      ctx.moveTo(x1, yPulse + g.getEcgY(x1, w));

      if (x1 >= xEnd || xStart >= x2) {
        ctx.lineTo(x2, yPulse + g.getEcgY(x2, w));
        return;
      }

      if (xStart > x1) {
        ctx.lineTo(xStart, yPulse);
      }

      var startLoop = x1 > xStart ? x1 : xStart;
      var endLoop = xEnd > x2 ? x2 : xEnd;

      startLoop = Math.floor(startLoop / 8) * 8 + 8;

      for (var x = startLoop; endLoop > x; x += 8) {
        ctx.lineTo(x, yPulse + g.getEcgY(x, w));
      }

      ctx.lineTo(endLoop, yPulse + g.getEcgY(endLoop, w));

      if (x2 > xEnd) {
        ctx.lineTo(x2, yPulse);
      }
    };

    g.drawCountdownBg = function(ctx) {
      var w = ctx.width;
      if (!w || 100 > w) {
        return;
      }

      var cx = w / 2;
      var cy = w / 2;

      // Fondo negro base
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, w, w);

      // Curved yellow header banner
      var r = w / 2 - 14;
      var dy = 0.15 * w - cy;
      if (r >= Math.abs(dy)) {
        var end = Math.asin(dy / r);
        var start = -Math.PI - end;
        ctx.beginPath();
        ctx.arc(cx, cy, r, start, end, false);
        ctx.closePath();
        ctx.fillStyle = '#FFE322';
        ctx.fill();
      }

      // Draw top button indicator bracket if countdown hasn't started (g.countVal >= 5)
      if (g.countVal >= 5) {
        var bx = cx + cx * 0.72;
        var by = cy - cy * 0.52;
        var bLen = 12;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.moveTo(bx - bLen, by);
        ctx.lineTo(bx, by);
        ctx.lineTo(bx, by + bLen);
        ctx.stroke();
      }

      var yPulse = cy + 80; // EFG un pelin mas abajo
      ctx.lineCap = 'round';

      var cycleTicks = 15; 
      var currentTick = g.animTick % cycleTicks;
      var sweepX = (currentTick / cycleTicks) * w;
      
      // Draw left segment (active neon sweep)
      ctx.lineWidth = 5;
      ctx.strokeStyle = '#36E4FF';
      ctx.beginPath();
      var sweepX_nearest = Math.round(sweepX / 4) * 4;
      if (sweepX_nearest >= w) sweepX_nearest = Math.floor(w / 4) * 4;
      if (0 > sweepX_nearest) sweepX_nearest = 0;
      g.drawEcgPath(ctx, 0, sweepX_nearest, w, yPulse);
      ctx.stroke();

      // Draw glowing white head dot at sweepX_nearest
      if (sweepX_nearest >= 0) {
        var headY = yPulse + g.getEcgY(sweepX_nearest, w);
        ctx.fillStyle = '#FFFFFF';
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = '#36E4FF';
        ctx.beginPath();
        ctx.arc(sweepX_nearest, headY, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    };

    g.onCountdownChange = function(targetData) {
      g.countVal = Number(targetData) || 0;
      
      // Si el valor es menor que 0, escondemos el texto. Si es de 5 a 0, se mantiene visible.
      if (g.countVal < 0) {
          setStyle('#text-num', 'visibility', 'hidden');
      } else {
          setStyle('#text-num', 'visibility', 'visible');
      }
      control('#countBgCanvas', 'REFRESH');
    };

    g.activate = function() {
      g.tickSub = $.subscribe('/Dev/Time/Tick10hz', function() {
        g.animTick++;
        if (g.animTick >= 20000) {
          g.animTick = 0;
        }
        control('#countBgCanvas', 'REFRESH');
      });

      // Driver de animación para el emulador 
      if (typeof navigator !== 'undefined' && navigator.userAgent) {
        g.emuInterval = setInterval(function() {
          g.animTick++;
          if (g.animTick >= 20000) {
            g.animTick = 0;
          }
          control('#countBgCanvas', 'REFRESH');
        }, 100);
      }
    };

    g.deactivate = function() {
      if (g.tickSub) {
        $.unsubscribe(g.tickSub);
        g.tickSub = null;
      }
      if (g.emuInterval) {
        clearInterval(g.emuInterval);
        g.emuInterval = null;
      }
    };
" onActivate="g.activate();" onDeactivate="g.deactivate();">
    <div style="background-color:#111111; width:100%; height:100%; position:absolute; top:0; left:0;">
        <object type="canvas" id="countBgCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%;" build="ctx => g.drawCountdownBg(ctx);" />

        <div style="top:4%; left:12%; width:76%; height:11%; position:absolute;">
            <div class="sp-t-m p-hc" style="top:calc(58% - 50%e); color:#000000; font-weight:bold; position:absolute;">
                START
            </div>
        </div>

        <div id="text-num" class="p-hc" style="top:18%; color:#FFE322; font-size:60px; font-weight:bold;">
            <eval input="/Zapp/{zapp_index}/Output/countdown" outputFormat="script x => (x >= 0 ? x.toString() : ' ')" default="5" onValueChanged="g.onCountdownChange(targetData);" />
        </div>

        <userInput>
          <pushButton name="up" type="lock" longType="lock" onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');" />
        </userInput>
    </div>
</uiView>
