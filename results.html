<uiView onFlickDown="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');" onFlickUp="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');">
  <div style="background-color:#111111; width:100%; height:100%; position:absolute; top:0; left:0;">

      <!-- Title -->
      <div class="sp-t-s p-hc" style="top:calc(12% - 50%e); color:#FFE322; font-weight:bold; position:absolute;">
          UMBRALES LACTATO
      </div>

      <!-- ==================== SECCION LT1 (AERO) ==================== -->
      <div class="f-s" style="top:calc(22% - 50%e); left:15%; position:absolute; color:#00FF78; font-weight:bold;">
          LT1 (Aeróbico)
      </div>

      <!-- LT1 HR -->
      <div class="sp-vertical-center" style="top:calc(32% - 50%e); left:calc(32% - 50%e); position:absolute;">
          <span class="f-num" style="font-size:24px; color:#FFFFFF;">
              <eval input="/Zapp/{zapp_index}/Output/lt1HR" outputFormat="HeartRate_Fourdigits" default="---" />
          </span>
          <span style="font-size:12px; color:#AAAAAA; margin-left:4px;">bpm</span>
      </div>

      <!-- LT1 Pace -->
      <div class="sp-vertical-center" style="top:calc(32% - 50%e); left:calc(72% - 50%e); position:absolute;">
          <span class="f-num" style="font-size:24px; color:#FFFFFF;">
              <eval input="/Zapp/{zapp_index}/Output/lt1Pace" outputFormat="Pace_Fourdigits" default="--:--" />
          </span>
          <span style="font-size:12px; color:#AAAAAA; margin-left:4px;">/km</span>
      </div>

      <!-- Separator Line -->
      <div class="p-hc" style="top:42%; width:80%; height:1px; background-color:#333333; position:absolute;"></div>

      <!-- ==================== SECCION LT2 (ANAERO) ==================== -->
      <div class="f-s" style="top:calc(50% - 50%e); left:15%; position:absolute; color:#FF2A55; font-weight:bold;">
          LT2 (Anaeróbico)
      </div>

      <!-- LT2 HR -->
      <div class="sp-vertical-center" style="top:calc(60% - 50%e); left:calc(32% - 50%e); position:absolute;">
          <span class="f-num" style="font-size:24px; color:#FFFFFF;">
              <eval input="/Zapp/{zapp_index}/Output/lt2HR" outputFormat="HeartRate_Fourdigits" default="---" />
          </span>
          <span style="font-size:12px; color:#AAAAAA; margin-left:4px;">bpm</span>
      </div>

      <!-- LT2 Pace -->
      <div class="sp-vertical-center" style="top:calc(60% - 50%e); left:calc(72% - 50%e); position:absolute;">
          <span class="f-num" style="font-size:24px; color:#FFFFFF;">
              <eval input="/Zapp/{zapp_index}/Output/lt2Pace" outputFormat="Pace_Fourdigits" default="--:--" />
          </span>
          <span style="font-size:12px; color:#AAAAAA; margin-left:4px;">/km</span>
      </div>

      <!-- LT2 Power (Symmetrical: label left, W value right) -->
      <div class="f-s sp-vertical-center" style="top:calc(74% - 50%e); left:calc(32% - 50%e); position:absolute; color:#AAAAAA;">
          Potencia
      </div>
      <div class="sp-vertical-center" style="top:calc(74% - 50%e); left:calc(72% - 50%e); position:absolute;">
          <span class="f-num" style="font-size:26px; color:#FFFFFF;">
              <eval input="/Zapp/{zapp_index}/Output/lt2Power" outputFormat="Power_Fourdigits" default="---" />
          </span>
          <span style="font-size:12px; color:#AAAAAA; margin-left:4px;">W</span>
      </div>

      <!-- Footer Hint -->
      <div class="f-s p-hc" style="top:calc(88% - 50%e); color:#AAAAAA; font-size:12px; position:absolute;">
          (Guarda la actividad)
      </div>

      <!-- Button Navigation -->
      <userInput>
          <pushButton name="next" type="lock" longType="lock"
              onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
              onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');" />
          <pushButton name="up" type="lock" longType="lock"
              onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
              onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');" />
      </userInput>
  </div>
</uiView>
